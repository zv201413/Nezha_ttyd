name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: nezha-ttyd
  REGISTRY: ghcr.io
  LOWERCASE_REPO: ${{ github.repository_owner }}/nezha_ttyd

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.LOWERCASE_REPO }}:latest
            ${{ env.REGISTRY }}/${{ env.LOWERCASE_REPO }}:${{ github.sha }}
